          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          # Gerar ícones PNG com Python
          python3 << 'PYEOF'
from PIL import Image, ImageDraw
import os
for folder, size in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]:
    path = f"app/src/main/res/{folder}"
    os.makedirs(path, exist_ok=True)
    img = Image.new('RGBA',(size,size),(255,107,44,255))
    draw = ImageDraw.Draw(img)
    m=size//4; cx,cy=size//2,size//2
    draw.polygon([(cx-m//2,cy-m),(cx-m//2,cy+m),(cx+m,cy)],fill=(255,255,255,255))
    img.save(f"{path}/ic_launcher.png")
    img2 = Image.new('RGBA',(size,size),(0,0,0,0))
    d2=ImageDraw.Draw(img2)
    d2.ellipse([0,0,size-1,size-1],fill=(255,107,44,255))
    d2.polygon([(cx-m//2,cy-m),(cx-m//2,cy+m),(cx+m,cy)],fill=(255,255,255,255))
    img2.save(f"{path}/ic_launcher_round.png")
PYEOF

      - name: Instalar Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$(pwd)/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Baixar fonte Roboto-Bold
        run: |
          curl -L "https://github.com/google/fonts/raw/main/apache/roboto/static/Roboto-Bold.ttf" -o app/src/main/assets/fonts/Roboto-Bold.ttf

      - name: Compilar APK
        run: gradle assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: VideoCompiler-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
