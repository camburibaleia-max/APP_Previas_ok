name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Baixar fonte Roboto-Bold
        run: |
          mkdir -p app/src/main/assets/fonts
          curl -L "https://github.com/google/fonts/raw/main/apache/roboto/static/Roboto-Bold.ttf" \
            -o app/src/main/assets/fonts/Roboto-Bold.ttf

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Compilar APK
        run: gradle assembleDebug --stacktrace

      - name: Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoCompiler-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
