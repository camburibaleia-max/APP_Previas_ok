name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Criar todos os arquivos do projeto
        run: |
          mkdir -p  2>/dev/null || true
          echo "" | base64 -d > settings.gradle
          mkdir -p  2>/dev/null || true
          echo "cGx1Z2lucyB7CiAgICBpZCAnY29tLmFuZHJvaWQuYXBwbGljYXRpb24nIHZlcnNpb24gJzguMi4yJyBhcHBseSBmYWxzZQogICAgaWQgJ29yZy5qZXRicmFpbnMua290bGluLmFuZHJvaWQnIHZlcnNpb24gJzEuOS4yMicgYXBwbHkgZmFsc2UKfQo=" | base64 -d > build.gradle
          mkdir -p gradle/wrapper 2>/dev/null || true
          echo "" | base64 -d > gradle/wrapper/gradle-wrapper.properties
          mkdir -p app 2>/dev/null || true
          echo "" | base64 -d > app/build.gradle
          mkdir -p app 2>/dev/null || true
          echo "LWtlZXAgY2xhc3MgY29tLmFydGhlbmljYS4qKiB7ICo7IH0KLWRvbnR3YXJuIGNvbS5hcnRoZW5pY2EuKioK" | base64 -d > app/proguard-rules.pro
          mkdir -p app/src/main 2>/dev/null || true
          echo "" | base64 -d > app/src/main/AndroidManifest.xml
          mkdir -p app/src/main/res/xml 2>/dev/null || true
          echo "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHBhdGhzPgogICAgPGV4dGVybmFsLWZpbGVzLXBhdGggbmFtZT0ibW92aWVzIiBwYXRoPSJNb3ZpZXMvIiAvPgogICAgPGNhY2hlLXBhdGggbmFtZT0iY2FjaGUiIHBhdGg9Ii4iIC8+CiAgICA8ZXh0ZXJuYWwtY2FjaGUtcGF0aCBuYW1lPSJleHRlcm5hbF9jYWNoZSIgcGF0aD0iLiIgLz4KPC9wYXRocz4K" | base64 -d > app/src/main/res/xml/file_paths.xml
          mkdir -p app/src/main/res/values 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/values/colors.xml
          mkdir -p app/src/main/res/values 2>/dev/null || true
          echo "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPlZpZGVvIENvbXBpbGVyPC9zdHJpbmc+CjwvcmVzb3VyY2VzPgo=" | base64 -d > app/src/main/res/values/strings.xml
          mkdir -p app/src/main/res/values 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/values/themes.xml
          mkdir -p app/src/main/res/drawable 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/drawable/ic_logo_placeholder.xml
          mkdir -p app/src/main/res/drawable 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/drawable/ic_folder.xml
          mkdir -p app/src/main/res/drawable 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/drawable/ic_compile.xml
          mkdir -p app/src/main/res/drawable 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/drawable/ic_share.xml
          mkdir -p app/src/main/res/drawable 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/drawable/bg_logo_preview.xml
          mkdir -p app/src/main/res/drawable 2>/dev/null || true
          echo "PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHNoYXBlIHhtbG5zOmFuZHJvaWQ9Imh0dHA6Ly9zY2hlbWFzLmFuZHJvaWQuY29tL2Fway9yZXMvYW5kcm9pZCIgYW5kcm9pZDpzaGFwZT0icmVjdGFuZ2xlIj4KICAgIDxzb2xpZCBhbmRyb2lkOmNvbG9yPSIjQ0MwMDAwMDAiIC8+CiAgICA8Y29ybmVycyBhbmRyb2lkOnJhZGl1cz0iNmRwIiAvPgo8L3NoYXBlPgo=" | base64 -d > app/src/main/res/drawable/bg_overlay_preview.xml
          mkdir -p app/src/main/res/drawable 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/drawable/ic_launcher_foreground.xml
          mkdir -p app/src/main/res/mipmap-anydpi-v26 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          mkdir -p app/src/main/res/mipmap-anydpi-v26 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          mkdir -p app/src/main/java/com/compilador/video 2>/dev/null || true
          echo "" | base64 -d > app/src/main/java/com/compilador/video/ProcessingState.kt
          mkdir -p app/src/main/java/com/compilador/video 2>/dev/null || true
          echo "" | base64 -d > app/src/main/java/com/compilador/video/FolderInfo.kt
          mkdir -p app/src/main/java/com/compilador/video 2>/dev/null || true
          echo "" | base64 -d > app/src/main/java/com/compilador/video/LogoManager.kt
          mkdir -p app/src/main/java/com/compilador/video 2>/dev/null || true
          echo "" | base64 -d > app/src/main/java/com/compilador/video/VideoProcessor.kt
          mkdir -p app/src/main/java/com/compilador/video 2>/dev/null || true
          echo "" | base64 -d > app/src/main/java/com/compilador/video/MainViewModel.kt
          mkdir -p app/src/main/java/com/compilador/video 2>/dev/null || true
          echo "" | base64 -d > app/src/main/java/com/compilador/video/MainActivity.kt
          mkdir -p app/src/main/res/mipmap-mdpi 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-hdpi 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-xhdpi 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-xxhdpi 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          mkdir -p app/src/main/res/mipmap-xxxhdpi 2>/dev/null || true
          echo "" | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Instalar Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$(pwd)/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Baixar fonte Roboto-Bold
        run: |
          mkdir -p app/src/main/assets/fonts
          curl -L "https://github.com/google/fonts/raw/main/apache/roboto/static/Roboto-Bold.ttf" -o app/src/main/assets/fonts/Roboto-Bold.ttf

      - name: Criar gradle.properties
        run: |
          echo "YW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmFuZHJvaWQuZW5hYmxlSmV0aWZpZXI9dHJ1ZQpvcmcuZ3JhZGxlLmp2bWFyZ3M9LVhteDIwNDhtIC1EZmlsZS5lbmNvZGluZz1VVEYtOAo=" | base64 -d > gradle.properties

      - name: Compilar APK
        run: gradle assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: VideoCompiler-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
