name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$(pwd)/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Baixar fonte Roboto-Bold
        run: |
          mkdir -p app/src/main/assets/fonts
          curl -L "https://github.com/google/fonts/raw/main/apache/roboto/static/Roboto-Bold.ttf" \
            -o app/src/main/assets/fonts/Roboto-Bold.ttf

      - name: Compilar APK
        run: gradle assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: VideoCompiler-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
