name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Criar estrutura de pastas
        run: |
          mkdir -p app/src/main/java/com/compilador/video
          mkdir -p app/src/main/res/{values,drawable,xml,layout}
          mkdir -p app/src/main/res/mipmap-{anydpi-v26,mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}
          mkdir -p app/src/main/assets/fonts
          mkdir -p gradle/wrapper

      - name: Criar arquivos Kotlin (base64)
        run: |
          echo "" | base64 -d > app/src/main/java/com/compilador/video/ProcessingState.kt
          echo ""      | base64 -d > app/src/main/java/com/compilador/video/FolderInfo.kt
          echo ""     | base64 -d > app/src/main/java/com/compilador/video/LogoManager.kt
          echo ""  | base64 -d > app/src/main/java/com/compilador/video/VideoProcessor.kt
          echo ""   | base64 -d > app/src/main/java/com/compilador/video/MainViewModel.kt
          echo ""    | base64 -d > app/src/main/java/com/compilador/video/MainActivity.kt

      - name: Criar AndroidManifest e layout
        run: |
          echo ""     | base64 -d > app/src/main/AndroidManifest.xml
          echo "" | base64 -d > app/src/main/res/layout/activity_main.xml

      - name: Criar arquivos Gradle e recursos
        run: |
          cat > settings.gradle << 'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "VideoCompiler"
include ':app'
EOF

          cat > build.gradle << 'EOF'
plugins {
    id 'com.android.application' version '8.2.2' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
}
EOF

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

          cat > app/build.gradle << 'EOF'
plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}
android {
    namespace 'com.compilador.video'
    compileSdk 34
    defaultConfig {
        applicationId "com.compilador.video"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
        ndk { abiFilters "arm64-v8a", "armeabi-v7a", "x86_64" }
    }
    buildTypes {
        release { minifyEnabled false }
        debug { debuggable true }
    }
    buildFeatures { viewBinding true }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions { jvmTarget = '1.8' }
    packagingOptions { jniLibs { useLegacyPackaging true } }
}
dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.activity:activity-ktx:1.8.2'
    implementation 'com.arthenica:ffmpeg-kit-android-full:6.0-2'
    implementation 'androidx.documentfile:documentfile:1.0.1'
    implementation 'io.coil-kt:coil:2.5.0'
}
EOF

          cat > app/proguard-rules.pro << 'EOF'
-keep class com.arthenica.** { *; }
-dontwarn com.arthenica.**
EOF

          cat > app/src/main/res/xml/file_paths.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<paths>
    <external-files-path name="movies" path="Movies/" />
    <cache-path name="cache" path="." />
</paths>
EOF

